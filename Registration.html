<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Seller Register</title>
  <style>
    body {
      background-color: #f0f7f4;
      font-family: Arial;
      margin: 40px;
    }

    .box {
      background-color: white;
      width: 420px;
      margin: 0 auto;
      padding: 25px;
      border-radius: 8px;
      border: 1px solid #c8e6de;
    }

    h2 {
      text-align: center;
      color: #2d6a4f;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input:hover {
      border-color: #2d6a4f;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #52b788;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #409672;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Seller Registration</h2>
    <br>
    Name:<br>
    <input type="text" id="name"><br>

    Address:<br>
    <input type="text" id="address"><br>

    Phone:<br>
    <input type="text" id="phone"><br>

    Email:<br>
    <input type="text" id="email"><br>

    Username:<br>
    <input type="text" id="username"><br>

    Password:<br>
    <input type="password" id="password"><br><br>

    <button type="button" onclick="check()">Register</button>
  </div>

  <script>
    function check() {
      var name = document.getElementById("name").value;
      var address = document.getElementById("address").value;
      var phone = document.getElementById("phone").value;
      var email = document.getElementById("email").value;
      var user = document.getElementById("username").value;
      var pwd = document.getElementById("password").value;

      var nameOk = /^[A-Za-z ]+$/.test(name);
      var addOk = /^[A-Za-z0-9 ]+$/.test(address);
      var phoneOk = /^1[0-9]{10}$/.test(phone);
      var emailOk = email.indexOf("@") > -1 && (email.endsWith(".com") || email.endsWith(".cn"));
      var userOk = user.length >= 6;
      var pwdOk = pwd.length >= 6;

      if (nameOk && addOk && phoneOk && emailOk && userOk && pwdOk) {
        alert("Success");
      } else {
        alert("Invalid input");
      }
    }
  </script>
</body>

</html>
