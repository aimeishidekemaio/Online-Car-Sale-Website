<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 40px 32px;
    }

    .login-title {
      font-size: 24px;
      text-align: center;
      color: #333333;
      margin-bottom: 28px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      height: 46px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 0 15px;
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #409eff;
    }

    .login-btn {
      width: 100%;
      height: 46px;
      background-color: #b70000;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 8px;
    }

    .login-btn:hover {
      background-color: #990000;
    }

    .login-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .login-footer a {
      color: #409eff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2 class="login-title">Account Log In</h2>
    <div class="input-group">
      <input type="text" placeholder="Please enter your account">
    </div>
    <div class="input-group">
      <input type="password" placeholder="Please enter your password">
    </div>
    <button class="login-btn">Log in</button>
    <div class="login-footer">
      <a href="#">Register</a>
      <a href="#">Forgot Password</a>
      <a href="#">Help Center</a>
    </div>
  </div>
</body>
</html>
