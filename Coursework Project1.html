<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Add Car</title>
    <style>
        div{margin:30px; padding-left:400px; font-size:20px;}
        h1{padding:40px; background-color:aqua; text-align:center; font-weight:800; font-size:30px;}
        input{width:800px; height:50px;}
    </style>
</head>
<body>
    <h1>Add Car</h1>
    <form>
        <div>
            Color:<br /><input type="text" placeholder="e.g.:red" /><br />
        </div>
        <div>
            Model:<br /><input type="text" placeholder="e.g.:Tesla" /><br />
        </div>
        <div>
            Year:<br /><input type="text" placeholder="e.g.:2022" /><br />
        </div>
        <div>
            Location:<br /><input type="text" placeholder="e.g.:China" /><br />
        </div>
        <div>
            Price:<br /><input type="text" placeholder="e.g.:200000" /><br />
        </div>
        <div>
            Image of car:<br /><input type="image" /><br />
        </div>
        <div>
            <input type="submit" value="Submit Car Details" />
        </div>
</form>
</body>
</html>
